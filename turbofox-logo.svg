<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 450" width="400" height="450">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d1b00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="foxBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E85D26;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="450" fill="url(#sky)" />

  <!-- Glow behind fox -->
  <circle cx="200" cy="220" r="140" fill="url(#glow)" />

  <!-- Stars -->
  <circle cx="50" cy="60" r="1.5" fill="#fff" opacity="0.8" />
  <circle cx="120" cy="30" r="1" fill="#fff" opacity="0.6" />
  <circle cx="300" cy="50" r="1.5" fill="#fff" opacity="0.7" />
  <circle cx="350" cy="90" r="1" fill="#fff" opacity="0.5" />
  <circle cx="80" cy="120" r="1" fill="#fff" opacity="0.4" />
  <circle cx="320" cy="130" r="1.2" fill="#fff" opacity="0.6" />
  <circle cx="30" cy="180" r="0.8" fill="#fff" opacity="0.4" />
  <circle cx="370" cy="30" r="0.8" fill="#fff" opacity="0.5" />
  <circle cx="250" cy="20" r="1.2" fill="#fff" opacity="0.7" />
  <circle cx="160" cy="70" r="0.8" fill="#fff" opacity="0.5" />

  <!-- Moon -->
  <circle cx="310" cy="80" r="20" fill="#ffedd5" opacity="0.15" />
  <circle cx="310" cy="80" r="14" fill="url(#moonGlow)" />

  <!-- Ground / hills -->
  <ellipse cx="200" cy="440" rx="250" ry="40" fill="#1a1a0e" opacity="0.5" />

  <!-- Fox silhouette - leaping between earth and sky -->
  <g transform="translate(200, 240)">

    <!-- Fox body -->
    <path d="M-15,-30 C-25,-45 -35,-60 -30,-70 C-25,-75 -15,-70 -10,-60
             C-5,-50 0,-40 5,-35 C10,-30 15,-28 20,-30
             C30,-35 35,-30 32,-20 C30,-15 25,-10 20,-5
             C15,0 10,5 5,8 C0,10 -5,8 -10,5
             C-15,0 -20,-10 -22,-20 C-24,-28 -20,-30 -15,-30Z"
          fill="url(#foxBody)" />

    <!-- Fox head -->
    <path d="M-10,-60 C-8,-65 -5,-68 -2,-65
             C0,-62 2,-58 5,-55 C8,-52 10,-48 10,-45
             C10,-42 8,-40 5,-38 C2,-36 -2,-35 -5,-38
             C-8,-40 -12,-45 -14,-50 C-16,-55 -14,-58 -10,-60Z"
          fill="#FF6B35" />

    <!-- Fox ears -->
    <path d="M-8,-65 L-12,-85 L-2,-70Z" fill="#E85D26" />
    <path d="M2,-65 L8,-80 L6,-65Z" fill="#E85D26" />

    <!-- Inner ears -->
    <path d="M-7,-67 L-10,-80 L-3,-70Z" fill="#FF8C5A" />
    <path d="M3,-66 L7,-77 L5,-66Z" fill="#FF8C5A" />

    <!-- Fox nose -->
    <ellipse cx="0" cy="-58" rx="3" ry="2" fill="#1a1a1a" />

    <!-- Fox eyes -->
    <ellipse cx="-5" cy="-60" rx="2" ry="2" fill="#ffffff" opacity="0.9" />
    <ellipse cx="3" cy="-58" rx="2" ry="2" fill="#ffffff" opacity="0.9" />
    <circle cx="-5" cy="-60" r="1" fill="#0a0a1a" />
    <circle cx="3" cy="-58" r="1" fill="#0a0a1a" />

    <!-- Fox tail (big, sweeping) -->
    <path d="M20,-30 C35,-40 50,-50 55,-55
             C60,-60 65,-58 62,-50
             C60,-42 55,-35 50,-28
             C45,-20 40,-15 35,-12
             C30,-10 25,-15 22,-22
             C20,-28 20,-30 20,-30Z"
          fill="#E85D26" />
    <!-- Tail tip -->
    <path d="M55,-55 C60,-58 63,-55 62,-50
             C60,-45 57,-48 55,-52
             C53,-55 54,-56 55,-55Z"
          fill="#ffffff" opacity="0.9" />

    <!-- Fox legs -->
    <path d="M-5,5 C-8,15 -10,25 -8,30 C-6,35 -4,30 -2,20 C0,15 0,10 0,5Z"
          fill="#E85D26" />
    <path d="M8,0 C12,10 15,22 13,28 C11,32 9,28 7,18 C5,10 5,5 8,0Z"
          fill="#E85D26" />

    <!-- Front paws -->
    <ellipse cx="-5" cy="32" rx="4" ry="2" fill="#2d1b00" />
    <ellipse cx="11" cy="30" rx="4" ry="2" fill="#2d1b00" />

    <!-- Sparkle effect around the fox -->
    <circle cx="-40" cy="-80" r="2" fill="#FF6B35" opacity="0.6" />
    <circle cx="45" cy="-70" r="1.5" fill="#FF6B35" opacity="0.5" />
    <circle cx="-35" cy="-40" r="1" fill="#FF6B35" opacity="0.4" />
    <circle cx="40" cy="-10" r="1.5" fill="#FF6B35" opacity="0.5" />
  </g>

  <!-- Ground earth line -->
  <line x1="0" y1="430" x2="400" y2="430" stroke="#FF6B35" stroke-width="1" opacity="0.3" />

</svg>
